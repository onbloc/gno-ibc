name: coverage

# The pinned commit in .gno-version doesn't include the `-cover` flag yet;
# this workflow installs a gno build that has it (defaulting to
# gnolang/gno#4241 head) and runs `make test-cover`. The main toolchain pin
# and the regular test pipeline are untouched.
#
# KNOWN BROKEN against gnolang/gno#4241 head as of 2026-05-07:
#   1. `gno test -cover` regresses import resolution for packages whose
#      gnomod.toml `module = ...` differs from their on-disk directory
#      (PR #4241 bug — fix needed upstream).
#   2. Realm packages (gno.land/r/...) with the same dir-vs-module mismatch
#      fail `gno test` (no -cover) under any master commit newer than the
#      .gno-version pin — independent regression on master.
# This check is intentionally non-required until both are addressed
# upstream. Do not gate merges on it.
#
# Other risk: if the PR #4241 author rebases, GNO_COMMIT below becomes
# orphaned and `make install-gno` will fail until the default is bumped.
on:
  workflow_dispatch:
    inputs:
      gno_commit:
        description: "gno commit SHA to install (must include PR #4241; defaults to that PR's head)"
        required: false
        default: "57ad9a4a35daf50bdca5617fc89725a666a9c94b"
  pull_request:
    paths: &cov_paths
      - '**.gno'
      - '**.go'
      - 'gnowork.toml'
      - 'Makefile'
      - 'stdlibs/**'
      - 'tools/setup-stdlibs.py'
      - '.github/workflows/gno-coverage.yml'
  push:
    branches: [main]
    paths: *cov_paths

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

env:
  # `inputs.gno_commit` is only set on workflow_dispatch; fall back to the
  # same default so pull_request and push events use a fixed SHA.
  GNO_COMMIT: ${{ inputs.gno_commit || '57ad9a4a35daf50bdca5617fc89725a666a9c94b' }}

jobs:
  gno-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      # Keyed on the override commit so this cache stays isolated from the
      # main test workflow's cache (which keys on .gno-version).
      - name: Cache gno binary (coverage)
        id: gno-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/gno
            ~/.cache/gno-ibc/gno
          key: gno-cover-${{ runner.os }}-${{ env.GNO_COMMIT }}-${{ hashFiles('stdlibs/**/*.go', 'stdlibs/**/gnomod.toml', 'stdlibs/go.mod', 'stdlibs/go.sum', 'tools/setup-stdlibs.py') }}
          restore-keys: |
            gno-cover-${{ runner.os }}-${{ env.GNO_COMMIT }}-

      - name: Cache Go build + modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gobuild-cover-${{ runner.os }}-${{ env.GNO_COMMIT }}
          restore-keys: |
            gobuild-cover-${{ runner.os }}-

      - name: Install gno toolchain (coverage build)
        if: steps.gno-cache.outputs.cache-hit != 'true'
        run: make install-gno GNO_COMMIT=${{ env.GNO_COMMIT }}

      - name: Refresh stdlib symlinks
        if: steps.gno-cache.outputs.cache-hit == 'true'
        run: make link-stdlibs GNO_COMMIT=${{ env.GNO_COMMIT }}

      - name: Verify gno binary
        run: make verify-gno GNO_COMMIT=${{ env.GNO_COMMIT }}

      - name: Run gno tests with coverage
        run: make test-cover GNO_COMMIT=${{ env.GNO_COMMIT }}

      - name: Render coverage summary
        if: always()
        run: |
          {
            echo "## Gno coverage"
            echo ""
            echo "Toolchain commit: \`${{ env.GNO_COMMIT }}\`"
            echo ""
            if [ -s coverage/profile.txt ]; then
              echo '<details><summary>Full report</summary>'
              echo ''
              echo '```'
              cat coverage/profile.txt
              echo '```'
              echo ''
              echo '</details>'
              echo ''
              total=$(grep -E '^Total Coverage:' coverage/profile.txt | tail -n1 || true)
              if [ -n "$total" ]; then
                echo "**$total**"
              fi
            else
              echo "_No coverage report produced. See the job logs and the \`gno-coverage\` artifact._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gno-coverage
          path: coverage/
          if-no-files-found: warn
