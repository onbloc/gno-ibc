services:
  gno:
    build:
      context: ../..
      dockerfile: e2e/union/gno/Dockerfile
      args:
        GNO_REPO: ${GNO_REPO:-https://github.com/gnolang/gno}
        GNO_COMMIT: ${GNO_COMMIT:-master}
    ports:
      - "${GNO_RPC_PORT:-16657}:26657"
      - "${GNO_WEB_PORT:-18888}:8888"
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/status"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 120s

  tx-indexer:
    image: ghcr.io/gnolang/tx-indexer:latest
    command:
      - start
      - -remote
      - http://gno:26657
      - -listen-address
      - 0.0.0.0:8546
    ports:
      - "${GNO_INDEXER_PORT:-48546}:8546"
    depends_on:
      gno:
        condition: service_healthy

  gno-whitelist:
    build:
      context: ../..
      dockerfile: e2e/union/gno/Dockerfile
      args:
        GNO_REPO: ${GNO_REPO:-https://github.com/gnolang/gno}
        GNO_COMMIT: ${GNO_COMMIT:-master}
    profiles: ["setup"]
    entrypoint: ["bash", "/whitelist.sh"]
    volumes:
      - ./gno/whitelist.sh:/whitelist.sh:ro
    env_file:
      - .env.example
    depends_on:
      gno:
        condition: service_healthy

  relayer:
    image: ghcr.io/allinbits/ibc-v2-ts-relayer:latest
    profiles: ["legacy-relay"]
    entrypoint: ["/entrypoint.sh"]
    command: ["ibc-v2-ts-relayer", "relay"]
    volumes:
      - ./relayer/entrypoint.sh:/entrypoint.sh:ro
    cap_add:
      - IPC_LOCK
    env_file:
      - .env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tx-indexer:
        condition: service_started

  voyager-build:
    build:
      context: ${UNION_VOYAGER_DIR:-/Users/notjoon/union-voyager}
      dockerfile: voyager-build.Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    profiles: ["voyager-build"]
    image: union-voyager-build
    volumes:
      - ./voyager-bin:/output
