name: test

on:
  push:
    branches: [main]
    paths: &test_paths
      - '**.gno'
      - '**.go'
      - '.gno-version'
      - 'gnowork.toml'
      - 'Makefile'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/actions/setup-gno/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths: *test_paths

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gno-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup gno
        uses: ./.github/actions/setup-gno

      - name: Verify gno binary
        run: make verify-gno

      - name: Run tests
        run: make test
