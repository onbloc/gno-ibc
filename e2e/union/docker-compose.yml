services:
  # Union devnet service - disabled by default, enable when needed
  # To use: docker compose --profile union-devnet up -d
  union-devnet:
    image: ghcr.io/unionlabs/union:latest
    ports:
      - "${UNION_RPC_PORT:-26657}:26657"
      - "${UNION_REST_PORT:-1317}:1317"
    environment:
      - MONIKER=union-devnet
      - CHAIN_ID=union-devnet-1
    profiles: ["union-devnet"]

  gno:
    build:
      context: ../..
      dockerfile: e2e/union/gno/Dockerfile
      args:
        GNO_REPO: ${GNO_REPO:-https://github.com/gnolang/gno}
        GNO_COMMIT: ${GNO_COMMIT:-master}
    ports:
      - "${GNO_RPC_PORT:-16657}:26657"
      - "${GNO_WEB_PORT:-18888}:8888"
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/status"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 120s

  tx-indexer:
    image: ghcr.io/gnolang/tx-indexer:latest
    command:
      - start
      - -remote
      - http://gno:26657
      - -listen-address
      - 0.0.0.0:8546
    ports:
      - "${GNO_INDEXER_PORT:-48546}:8546"
    depends_on:
      gno:
        condition: service_healthy

  gno-whitelist:
    build:
      context: ../..
      dockerfile: e2e/union/gno/Dockerfile
      args:
        GNO_REPO: ${GNO_REPO:-https://github.com/gnolang/gno}
        GNO_COMMIT: ${GNO_COMMIT:-master}
    profiles: ["setup"]
    entrypoint: ["bash", "/whitelist.sh"]
    volumes:
      - ./gno/whitelist.sh:/whitelist.sh:ro
    env_file:
      - .env.example
    depends_on:
      gno:
        condition: service_healthy

  relayer:
    image: ghcr.io/allinbits/ibc-v2-ts-relayer:latest
    profiles: ["legacy-relay"]
    entrypoint: ["/entrypoint.sh"]
    command: ["ibc-v2-ts-relayer", "relay"]
    volumes:
      - ./relayer/entrypoint.sh:/entrypoint.sh:ro
    cap_add:
      - IPC_LOCK
    env_file:
      - .env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tx-indexer:
        condition: service_started

  voyager-build:
    build:
      context: ${UNION_VOYAGER_DIR:-/Users/notjoon/union-voyager}
      dockerfile: /Users/notjoon/gno-ibc/e2e/union/voyager-build.Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    profiles: ["voyager-build"]
    image: union-voyager-build
    volumes:
      - ./voyager-bin:/output

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  voyager:
    image: union-voyager-build:latest
    command: ["sh", "/entrypoint.sh"]
    working_dir: /output
    volumes:
      - ${VOYAGER_CONFIG}:/config/voyager-config.gno-union.jsonc:ro
      - /Users/notjoon/gno-ibc/e2e/union/voyager-entrypoint.sh:/entrypoint.sh:ro
    env_file:
      - .env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      tx-indexer:
        condition: service_started
    profiles: ["voyager"]
