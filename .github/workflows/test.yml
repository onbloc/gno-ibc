name: test

on:
  push:
    branches: [main]
    paths: &test_paths
      - '**.gno'
      - '**.go'
      - '.gno-version'
      - 'gnowork.toml'
      - 'Makefile'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/actions/setup-gno/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths: *test_paths

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Discover all gno packages to test
  discover-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: packages
        run: |
          # Exclude packages under any ignore/ directory (scratch/scenario realms
          # that are not part of the first-party test suite). Mirrors USER_GNO_PKGS
          # in the Makefile.
          pkgs=$(find gno.land/p/onbloc gno.land/r/onbloc -name gnomod.toml 2>/dev/null | grep -v '/ignore/' | sort | sed 's|gnomod.toml||' | sed 's|^|./|' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$pkgs" >> "$GITHUB_OUTPUT"

  # Test each package in parallel
  gno-test:
    needs: discover-packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.discover-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup gno
        uses: ./.github/actions/setup-gno

      - name: Verify gno binary
        run: make verify-gno

      - name: Test ${{ matrix.pkg }}
        id: test
        run: |
          make vendor
          gno test ${{ matrix.pkg }}

      - name: Report result
        if: always()
        run: |
          status="${{ steps.test.outcome }}"
          pkg="${{ matrix.pkg }}"
          emoji="✅"
          [ "$status" != "success" ] && emoji="❌"
          echo "$emoji $pkg" >> "$GITHUB_STEP_SUMMARY"
