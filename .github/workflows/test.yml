name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gno-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      # Cache the installed gno binary, keyed on the pinned commit AND the
      # vendored stdlib sources. Bumping .gno-version or editing stdlibs/
      # invalidates the cache so the binary is rebuilt with the new bindings.
      - name: Cache gno binary
        id: gno-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/gno
            ~/.cache/gno-ibc/gno
          key: gno-${{ runner.os }}-${{ hashFiles('.gno-version', 'stdlibs/**', 'tools/setup-stdlibs.py') }}

      - name: Install pinned gno toolchain
        if: steps.gno-cache.outputs.cache-hit != 'true'
        run: make install-gno

      - name: Verify gno binary
        run: make verify-gno

      - name: Run tests
        run: make test

      - name: Run vendored stdlib tests
        run: make test-stdlibs
